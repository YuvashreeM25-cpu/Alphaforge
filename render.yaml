# Deploy on Render (https://render.com). Push to GitHub, then "New > Blueprint".
services:
  - type: web
    name: alphaforge-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase: {name: alphaforge-db, property: connectionString}
      - key: REDIS_URL
        fromService: {type: redis, name: alphaforge-redis, property: connectionString}
      - key: ANTHROPIC_API_KEY
        sync: false
  - type: redis
    name: alphaforge-redis
    ipAllowList: []
    plan: free
databases:
  - name: alphaforge-db
    plan: free
