name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests (SQLite backend)
        run: pytest -q
      - name: Smoke-test the agent end to end
        run: python run_demo.py --question "Is NVDA cheap vs peers?"

  build-cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build C++ risk engine and benchmark
        run: |
          pip install -r requirements.txt pybind11
          pip install ./risk/cpp
          python -m risk.benchmark
