<!doctype html>
<meta charset="utf-8">
<title>AlphaForge</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --bg:#0b0e14; --panel:#121722; --line:#222b3a; --ink:#e6edf3;
    --muted:#8b97a8; --accent:#4f9cff; --good:#3ecf8e; --warn:#ffb454; --bad:#ff6b6b;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  header{padding:22px 28px;border-bottom:1px solid var(--line);display:flex;
    align-items:baseline;gap:14px}
  header h1{margin:0;font-size:19px;letter-spacing:.3px}
  header span{color:var(--muted);font-size:13px}
  .wrap{max-width:980px;margin:0 auto;padding:26px}
  .ask{display:flex;gap:10px}
  .ask input{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--ink);
    padding:13px 15px;border-radius:10px;font-size:15px;outline:none}
  .ask input:focus{border-color:var(--accent)}
  .ask button{background:var(--accent);color:#04121f;border:0;padding:0 22px;border-radius:10px;
    font-weight:600;cursor:pointer;font-size:15px}
  .ask button:disabled{opacity:.5;cursor:default}
  .examples{margin:12px 0 22px;color:var(--muted);font-size:13px;display:flex;flex-wrap:wrap;gap:8px}
  .examples b{cursor:pointer;color:var(--accent);font-weight:500;border:1px solid var(--line);
    padding:4px 10px;border-radius:999px}
  .grid{display:grid;grid-template-columns:300px 1fr;gap:18px}
  @media(max-width:760px){.grid{grid-template-columns:1fr}}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px}
  .panel h3{margin:0 0 12px;font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
  .step{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px dashed var(--line)}
  .step:last-child{border-bottom:0}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);margin-top:6px;flex:none;
    box-shadow:0 0 0 4px rgba(79,156,255,.12)}
  .step .t{font-family:var(--mono);font-size:12px;color:var(--accent)}
  .step .s{font-size:13px;color:var(--muted)}
  .thesis{white-space:pre-wrap;font-size:14.5px;line-height:1.65}
  .thesis h1{font-size:18px;margin:.2em 0 .6em}
  .empty{color:var(--muted);font-size:14px}
  .pill{display:inline-block;font-family:var(--mono);font-size:11px;color:var(--muted);
    border:1px solid var(--line);border-radius:6px;padding:2px 7px;margin-left:8px}
  .err{color:var(--bad)}
</style>

<header>
  <h1>AlphaForge</h1>
  <span>agentic equity-research workbench · numbers from code, words from the LLM</span>
</header>

<div class="wrap">
  <div class="ask">
    <input id="q" placeholder="Ask: Is NVDA overvalued vs its semiconductor peers given the downside risk?"
           value="Is NVDA overvalued vs its semiconductor peers given the downside risk?">
    <button id="go">Research</button>
  </div>
  <div class="examples">
    Try:
    <b onclick="setQ(this)">Is AMD cheap vs its peers?</b>
    <b onclick="setQ(this)">What is the downside risk in TSM?</b>
    <b onclick="setQ(this)">Compare ASML valuation to the sector</b>
  </div>

  <div class="grid">
    <div class="panel">
      <h3>Agent plan</h3>
      <div id="steps"><div class="empty">The agent's tool calls will stream here.</div></div>
    </div>
    <div class="panel">
      <h3>Thesis <span id="meta" class="pill"></span></h3>
      <div id="thesis" class="thesis"><div class="empty">Ask a question to generate a cited thesis.</div></div>
    </div>
  </div>
</div>

<script>
const API = "http://localhost:8000";
const $ = s => document.querySelector(s);

function setQ(el){ $("#q").value = el.textContent; $("#go").click(); }

function renderMarkdownish(t){
  // tiny renderer: # headings, **bold**, - bullets
  return t
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/^# (.*)$/gm,"<h1>$1</h1>")
    .replace(/^## (.*)$/gm,'<div style="color:var(--accent);font-weight:600;margin:.9em 0 .3em">$1</div>')
    .replace(/\*\*(.*?)\*\*/g,"<b>$1</b>")
    .replace(/^_(.*)_$/gm,'<div style="color:var(--muted);font-style:italic">$1</div>')
    .replace(/^- (.*)$/gm,'<div style="margin:.15em 0">• $1</div>');
}

$("#go").onclick = async () => {
  const question = $("#q").value.trim();
  if(!question) return;
  $("#go").disabled = true; $("#go").textContent = "Working…";
  $("#steps").innerHTML = '<div class="empty">Planning…</div>';
  $("#thesis").innerHTML = '<div class="empty">Running tools…</div>';
  $("#meta").textContent = "";
  try{
    const res = await fetch(API + "/ask", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({question})
    });
    if(!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    // animate steps in
    $("#steps").innerHTML = "";
    data.steps.forEach((s,i)=>{
      setTimeout(()=>{
        const el = document.createElement("div");
        el.className = "step";
        el.innerHTML = `<div class="dot"></div><div><div class="t">${s.tool}()</div>
          <div class="s">${s.summary||""}</div></div>`;
        $("#steps").appendChild(el);
      }, i*220);
    });
    setTimeout(()=>{
      $("#thesis").innerHTML = renderMarkdownish(data.thesis);
      $("#meta").textContent = data.ticker;
    }, data.steps.length*220 + 150);
  }catch(e){
    $("#thesis").innerHTML = `<div class="err">Could not reach the API at ${API}.<br>
      Start it with: <code>uvicorn api.main:app --reload</code></div>`;
    $("#steps").innerHTML = "";
  }finally{
    $("#go").disabled = false; $("#go").textContent = "Research";
  }
};
</script>
